<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live TV - Stream Online</title>
    <link rel="stylesheet" href="style.css">
    <!-- HLS.js for Streaming -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

    <header>
        <h1>Fifa Live</h1>
    </header>

    <div class="container">
        <!-- Video Player Section -->
        <div class="player-section">
            <video id="video" controls autoplay></video>
            <h2 id="now-playing">Channel Select</h2>
        </div>

        <!-- Channel Grid Section -->
        <div class="channel-grid" id="channel-list">
            <!-- চ্যানেলগুলো এখানে অটোমেটিক লোড হবে -->
        </div>
    </div>

    <script src="script.js"></script>
    <!-- Font Awesome Icons এর জন্য এই লাইনটি <head> এর ভেতর দিন -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<!-- Navigation Bar -->
<nav class="bottom-nav">
    <div class="nav-item active" onclick="changeTab('home')">
        <i class="fas fa-home"></i>
        <span>Home</span>
    </div>
    <div class="nav-item" onclick="changeTab('category')">
        <i class="fas fa-list"></i>
        <span>Categories</span>
    </div>
    <div class="nav-item" onclick="changeTab('highlights')">
        <i class="fas fa-play-circle"></i>
        <span>Highlights</span>
    </div>
</nav>
</body>
</html>
