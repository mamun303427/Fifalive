<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fifa Live TV</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body class="dark-theme">

    <header>
        <div class="header-container">
            <img src="logo.png" alt="Logo" id="site-logo">
            <div id="theme-toggle" class="theme-btn" onclick="toggleTheme()">
                <i class="fas fa-sun" id="theme-icon"></i>
            </div>
        </div>
    </header>

    <div class="main-content">
        <!-- Home View -->
        <div id="home-view">
            <div class="container">
                <div class="player-wrapper home-player">
                    <video id="main-video" playsinline controls muted autoplay></video>
                    <div class="status-bar">
                        <span class="dot"></span>
                        <span class="live-txt">Live</span>
                        <span id="main-name">Server 1</span>
                    </div>
                </div>

                <div class="server-box" id="server-section">
                    <div class="server-one-line">
                        <button class="srv-btn active" onclick="playWC(0, this)"><span class="hd">HD</span> Server 1</button>
                        <button class="srv-btn" onclick="playWC(1, this)"><span class="hd">HD</span> Server 2</button>
                        <button class="srv-btn" onclick="playWC(2, this)"><span class="hd">HD</span> Server 3</button>
                        <button class="srv-btn" onclick="playWC(3, this)"><span class="hd">HD</span> Server 4</button>
                        <button class="srv-btn" onclick="playWC(4, this)"><span class="hd">HD</span> Server 5</button>
                    </div>
                </div>

                <div class="extra-heading"></div>
                <div class="grid" id="home-extra-grid"></div>
            </div>
        </div>

        <!-- Category View (New Design) -->
        <div id="cat-list-view" style="display: none;" class="container">
            <h2 class="page-title">Categories</h2>
            <div class="cat-grid-new">
                <div class="cat-item" onclick="openCat('sports')">
                    <div class="cat-circle"><i class="fas fa-trophy"></i></div>
                    <span>Sports</span>
                </div>
                <div class="cat-item" onclick="openCat('news')">
                    <div class="cat-circle"><i class="fas fa-newspaper"></i></div>
                    <span>News</span>
                </div>
                <div class="cat-item" onclick="openCat('kids')">
                    <div class="cat-circle"><i class="fas fa-child"></i></div>
                    <span>Kids</span>
                </div>
                <div class="cat-item" onclick="openCat('doc')">
                    <div class="cat-circle"><i class="fas fa-globe-americas"></i></div>
                    <span>Documentary</span>
                </div>
                <div class="cat-item" onclick="openCat('islamic')">
                    <div class="cat-circle"><i class="fas fa-mosque"></i></div>
                    <span>Islamic</span>
                </div>
                <div class="cat-item" onclick="openCat('bd')">
                    <div class="cat-circle"><img src="https://flagcdn.com/w160/bd.png"></div>
                    <span>Bangladesh</span>
                </div>
                <div class="cat-item" onclick="openCat('in')">
                    <div class="cat-circle"><img src="https://flagcdn.com/w160/in.png"></div>
                    <span>India</span>
                </div>
                <div class="cat-item" onclick="openCat('pk')">
                    <div class="cat-circle"><img src="https://flagcdn.com/w160/pk.png"></div>
                    <span>Pakistan</span>
                </div>
            </div>
        </div>

        <!-- Category Player View -->
        <div id="cat-player-view" style="display: none;">
            <div class="player-wrapper">
                <video id="cat-video" playsinline controls muted autoplay></video>
                <div class="status-bar">
                    <span class="dot"></span>
                    <span class="live-txt">Live</span>
                    <span id="cat-name">Selecting...</span>
                </div>
            </div>
            <div class="container">
                <button class="back-btn" onclick="navTo('cat')">← Back</button>
                <div class="grid" id="cat-grid"></div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <div class="nav-btn active" id="btn-home" onclick="navTo('home')">
            <i class="fas fa-home"></i><span>Home</span>
        </div>
        <div class="nav-btn" id="btn-cat" onclick="navTo('cat')">
            <i class="fas fa-th-large"></i><span>Categories</span>
        </div>
        <a href="https://hoofoot.com/" target="_blank" class="nav-btn">
            <i class="fas fa-play-circle"></i><span>Highlights</span>
        </a>
    </nav>

    <script src="script.js"></script>
</body>
</html>
