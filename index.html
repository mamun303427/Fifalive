<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live TV - Stream Online</title>
    <link rel="stylesheet" href="style.css">
    <!-- HLS.js for Streaming -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

    <header>
        <h1>Fifa Live</h1>
    </header>

    <div class="container">
        <!-- Video Player Section -->
        <div class="player-section">
            <video id="video" controls autoplay></video>
            <h2 id="now-playing">Channel Select</h2>
        </div>

        <!-- Channel Grid Section -->
        <div class="channel-grid" id="channel-list">
            <!-- চ্যানেলগুলো এখানে অটোমেটিক লোড হবে -->
        </div>
    </div>

    <script src="script.js"></script>
    <!-- Font Awesome Icons এর জন্য এই লাইনটি <head> এর ভেতর দিন -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<!-- Navigation Bar -->
<nav class="bottom-nav">
    <div class="nav-item active" onclick="changeTab('home')">
        <i class="fas fa-home"></i>
        <span>Home</span>
    </div>
    <div class="nav-item" onclick="changeTab('category')">
        <i class="fas fa-list"></i>
        <span>Categories</span>
    </div>
    <div class="nav-item" onclick="changeTab('highlights')">
        <i class="fas fa-play-circle"></i>
        <span>Highlights</span>
    </div>
</nav>
    <!-- Navigation Bar -->
<nav class="bottom-nav">
    <div class="nav-item active" id="home-btn" onclick="showSection('home')">
        <i class="fas fa-home"></i>
        <span>হোম</span>
    </div>
    <div class="nav-item" id="cat-btn" onclick="showSection('category')">
        <i class="fas fa-list"></i>
        <span>ক্যাটেগরি</span>
    </div>
    <!-- হাইলাইটস বাটন সরাসরি লিংকে নিয়ে যাবে -->
    <a href="https://hoofoot.com/" target="_blank" class="nav-item" style="text-decoration: none;">
        <i class="fas fa-play-circle"></i>
        <span>হাইলাইটস</span>
    </a>
</nav>

<div class="container">
    <!-- হোম সেকশন: প্লেয়ার এবং চ্যানেল লিস্ট থাকবে এখানে -->
    <div id="home-section">
        <div class="player-section">
            <video id="video" controls autoplay></video>
            <h2 id="now-playing">চ্যানেল সিলেক্ট করুন</h2>
        </div>
        <!-- লাইভ স্কোর উইজেট -->
        <div style="margin-top: 15px;">
            <iframe src="https://www.cricbuzz.com/api/html/homepage-scroller" width="100%" height="80" frameborder="0"></iframe>
        </div>
        <div class="channel-grid" id="channel-list"></div>
    </div>

    <!-- ক্যাটেগরি সেকশন: শুরুতে লুকানো থাকবে -->
    <div id="category-section" style="display: none;">
        <h2 style="text-align: center; margin-bottom: 20px;">সব ক্যাটেগরি</h2>
        <div class="category-grid">
            <!-- ক্যাটেগরি কার্ডসমূহ -->
            <div class="cat-card" onclick="alert('Sports Channels Load Here')">স্পোর্টস</div>
            <div class="cat-card" onclick="alert('News Channels Load Here')">নিউজ</div>
            <div class="cat-card" onclick="alert('Movies Channels Load Here')">মুভিজ</div>
            <div class="cat-card" onclick="alert('Music Channels Load Here')">মিউজিক</div>
        </div>
    </div>
</div>
</body>
</html>
