<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live TV Platform</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

    <header>
        <h1 id="page-title">Live TV</h1>
    </header>

    <div class="container">
        <!-- Main Section (Player + List) -->
        <div id="main-view">
            <div class="player-container">
                <video id="video-player" controls autoplay playsinline></video>
                <div id="status-bar">
                    <span id="current-channel-name">Loading...</span>
                </div>
            </div>

            <!-- This grid will be filled by JS -->
            <div class="channel-grid" id="channel-list"></div>
        </div>

        <!-- Category View (Hidden by default) -->
        <div id="category-view" style="display: none;">
            <h2 class="section-heading">Categories</h2>
            <div class="category-grid">
                <div class="cat-item" onclick="loadCategory('sports')"><i class="fas fa-trophy"></i><span>Sports</span></div>
                <div class="cat-item" onclick="loadCategory('news')"><i class="fas fa-newspaper"></i><span>News</span></div>
                <div class="cat-item" onclick="loadCategory('kids')"><i class="fas fa-child"></i><span>Kids</span></div>
                <div class="cat-item" onclick="loadCategory('doc')"><i class="fas fa-globe"></i><span>Documentary</span></div>
                <div class="cat-item" onclick="loadCategory('islamic')"><i class="fas fa-mosque"></i><span>Islamic</span></div>
                <div class="cat-item" onclick="loadCategory('bd')"><img src="https://flagcdn.com/w40/bd.png"><span>Bangladesh</span></div>
                <div class="cat-item" onclick="loadCategory('in')"><img src="https://flagcdn.com/w40/in.png"><span>India</span></div>
                <div class="cat-item" onclick="loadCategory('pk')"><img src="https://flagcdn.com/w40/pk.png"><span>Pakistan</span></div>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="bottom-menu">
        <div class="menu-item active" id="btn-home" onclick="navTo('home')">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </div>
        <div class="menu-item" id="btn-cat" onclick="navTo('cat')">
            <i class="fas fa-th-large"></i>
            <span>Categories</span>
        </div>
        <a href="https://hoofoot.com/" target="_blank" class="menu-item">
            <i class="fas fa-play-circle"></i>
            <span>Highlights</span>
        </a>
    </nav>

    <script src="script.js"></script>
</body>
</html>
